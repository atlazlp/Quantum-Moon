# ALC897 (Ryzen onboard): clearer labels; manual port pick (rear line-out vs front headphones).

monitor.alsa.rules = [
  {
    matches = [
      { alsa.id = "Generic_1" }
    ]
    actions = {
      update-props = {
        api.acp.auto-port = false
        device.nick = "Onboard ALC897"
        device.description = "Analog audio (speakers / headphones / microphone)"
      }
    }
  }
  {
    matches = [
      { node.name = "~alsa_output.pci-0000_11_00.6.analog-stereo" }
    ]
    actions = {
      update-props = {
        node.description = "Speakers or headphones — toggle port (Line Out / Headphones)"
      }
    }
  }
  {
    matches = [
      { node.name = "~alsa_input.pci-0000_11_00.6.analog-stereo" }
    ]
    actions = {
      update-props = {
        node.description = "Front or rear microphone"
      }
    }
  }
]
