# Prefer WebRTC echo-cancelled I/O over raw onboard analog nodes.

monitor.alsa.rules = [
  {
    matches = [
      { node.name = "echo-cancel-source" }
    ]
    actions = {
      update-props = {
        node.description = "Microphone (echo cancelled)"
        priority.session = 2500
        priority.driver = 2500
      }
    }
  }
  {
    matches = [
      { node.name = "echo-cancel-sink" }
    ]
    actions = {
      update-props = {
        node.description = "Speakers / headphones (echo cancelled)"
        priority.session = 2500
        priority.driver = 2500
      }
    }
  }
  {
    matches = [
      { node.name = "~alsa_input.pci-0000_11_00.6.analog-stereo" }
    ]
    actions = {
      update-props = {
        node.description = "Front or rear microphone (raw — use echo-cancelled input in apps)"
        priority.session = 200
        priority.driver = 200
      }
    }
  }
]
