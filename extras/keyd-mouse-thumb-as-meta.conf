# Typical "mouse 4" thumb (back): sends Left Meta while held — works everywhere (Hyprland, apps).
# Mouse detected on host: VID:PID 04d9:a09f (E-Signal USB Gaming Mouse).
# If nothing changes: sudo pacman -S keyd && sudo systemctl enable --now keyd
# Wrong physical button? Swap mouseback for mouseforward, or inspect with sudo evtest.
# Reload after edits: sudo systemctl restart keyd

[ids]
m:04d9:a09f

[main]
mouseback = leftmeta
