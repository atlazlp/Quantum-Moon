# Personal Hyprland prefs — install-caelestia*.sh only creates this file if missing (never overwrites).
# Default kb_layout br keeps ABNT2 dead keys; do not set kb_variant = nodeadkeys here unless you want that.

input {
    kb_layout = br
    follow_mouse = 1
}

cursor {
    no_hardware_cursors = true
}

group {
    drag_into_group = 1
}

# Side mouse button (BTN_SIDE / Hypr mouse:275): hold button + LMB drag move, + RMB drag resize, without Super.
# Caelestia global Super+LMB / Super+RMB bindings remain on the global submap.
submap = global
bind = , mouse:275, exec, bash $HOME/.config/caelestia/scripts/hypr-mouse-submap-if-not-steam-game.sh mousedragthumb

submap = mousedragthumb
bindm = , mouse:272, movewindow
bindm = , mouse:273, resizewindow
bindr = , mouse:275, submap, global
bind = , escape, submap, global

submap = global

# Mouse 5 / forward (BTN_EXTRA / Hypr mouse:276): hold mouse5 + LMB — togglegroup if solo, moveoutofgroup if tabbed.
bind = , mouse:276, exec, bash $HOME/.config/caelestia/scripts/hypr-mouse-submap-if-not-steam-game.sh mouse5group

submap = mouse5group
bindc = , mouse:272, exec, bash $HOME/.config/caelestia/scripts/hypr-group-mouse5.sh
bindr = , mouse:276, submap, global
bind = , escape, submap, global

submap = global
