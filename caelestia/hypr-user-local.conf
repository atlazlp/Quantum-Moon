# Personal Hyprland prefs — install-caelestia*.sh only creates this file if missing (never overwrites).
# Default kb_layout br keeps ABNT2 dead keys; do not set kb_variant = nodeadkeys here unless you want that.

input {
    kb_layout = br
    follow_mouse = 1
}

cursor {
    no_hardware_cursors = true
}

# Side mouse button (BTN_SIDE / Hypr mouse:275): hold button + LMB drag move, + RMB drag resize, without Super.
# Caelestia global Super+LMB / Super+RMB bindings remain on the global submap.
submap = global
bind = , mouse:275, submap, mousedragthumb

submap = mousedragthumb
bindm = , mouse:272, movewindow
bindm = , mouse:273, resizewindow
bindr = , mouse:275, submap, global
bind = , escape, submap, global

submap = global
