# Personal Hyprland prefs — install-caelestia*.sh only creates this file if missing (never overwrites).
# Default kb_layout br keeps ABNT2 dead keys; do not set kb_variant = nodeadkeys here unless you want that.

input {
    kb_layout = br
    follow_mouse = 1
}

cursor {
    no_hardware_cursors = true
}

group {
    drag_into_group = 1
}

# Thumb-button shortcuts.
# WORKAROUND for a Hyprland 0.55.3+ regression (merged PR #14633, modifier-state
# aggregation across multiple keyboards): MOUSE-button binds (bind/bindm on
# mouse:NNN) no longer fire, while keyboard-key binds bound by keycode still do.
# So middle-mouse-debounce (see extras/middle-mouse-debounce/) remaps the thumb
# switches to keyboard keys: mouse4/BTN_SIDE -> KEY_F13 (Hypr code:191),
# mouse5/BTN_EXTRA -> KEY_F14 (code:192). Restore the mouse:275/276 submaps
# below once the upstream regression is fixed.
#
# Original (restore when fixed):
#   submap = global
#   bind = , mouse:275, exec, bash $HOME/.config/caelestia/scripts/hypr-mouse-submap-if-not-steam-game.sh mousedragthumb
#   submap = mousedragthumb
#   bindm = , mouse:272, movewindow
#   bindm = , mouse:273, resizewindow
#   bindr = , mouse:275, submap, global
#   bind  = , escape, submap, global
#   submap = global
#   bind = , mouse:276, exec, bash $HOME/.config/caelestia/scripts/hypr-mouse-submap-if-not-steam-game.sh mouse5group
#   submap = mouse5group
#   bindc = , mouse:272, exec, bash $HOME/.config/caelestia/scripts/hypr-group-mouse5.sh
#   bindr = , mouse:276, submap, global
#   bind  = , escape, submap, global
#   submap = global

# mouse4 (F13): hold + move the mouse = move the focused window. (Resize via the
# old mouse4+RMB drag isn't reproducible with a single keycode; restore on fix.)
bindm = , code:191, movewindow

# mouse5 (F14): toggle group (togglegroup if solo, moveoutofgroup if grouped).
# Steam-game block is enforced inside hypr-group-mouse5.sh.
bind = , code:192, exec, bash $HOME/.config/caelestia/scripts/hypr-group-mouse5.sh
