# Merged after stock Caelestia hypr snippets.

# Never set PATH here with `env = PATH, ...` — incomplete expansion can leave only ~/.local/bin and break subprocesses after reload.

source = ~/.config/caelestia/hypr-env-qt.conf

unbind = Ctrl+Super+Alt, R
bindr = Ctrl+Super+Alt, R, exec, sh -c 'qs -c caelestia kill; sleep 0.35; caelestia shell -d; sleep 0.5; hyprctl hyprpaper reload 2>/dev/null || hyprpaper; f="${HOME}/.config/caelestia/quantum-moon-root"; [ -f "$f" ] && read -r QM < "$f" && [ -n "$QM" ] && [ -f "$QM/scripts/qm-video-sync-from-state" ] && bash "$QM/scripts/qm-video-sync-from-state"'

layerrule = no_anim true, match:namespace mpvpaper

# Example triple-head layout — edit names/resolutions to match `hyprctl monitors`.
monitor=HDMI-A-1,1366x768@59.79,0x0,1,transform,1
monitor=DP-2,1920x1080@143.99,768x0,1
monitor=DP-3,1366x768@59.79,2688x312,1

exec-once = sh -c "sleep 1 && exec hyprpaper"
exec-once = bash -c 'f="${HOME}/.config/caelestia/quantum-moon-root"; [[ -f "$f" ]] && read -r QM < "$f" && sleep 2 && "$QM/scripts/qm-apply" --persisted && exec "$QM/scripts/qm-video-watch"'
exec = sh -c 'f="${HOME}/.config/caelestia/quantum-moon-root"; [ -f "$f" ] || exit 0; read -r QM < "$f"; [ -n "$QM" ] && [ -f "$QM/scripts/qm-video-sync-from-state" ] && exec bash "$QM/scripts/qm-video-sync-from-state"'
exec-once = ~/.config/hypr/scripts/caelestia-autolock-on-login.sh
exec-once = ~/.config/caelestia/scripts/inhibit-sleep-while-audio-playback.sh

# Hyprspace: do not load on Hyprland 0.54.x (plugin SIGSEGV). If a built Hyprspace.so exists, keep it renamed to *.disabled until upstream fixes it.

unbind = Alt, Tab
unbind = Shift+Alt, Tab
unbind = SUPER, D
bind = SUPER, D, exec, bash $HOME/.config/caelestia/scripts/workspace-overview-toggle.sh all
binde = Alt, Tab, exec, bash $HOME/.config/caelestia/scripts/window-alt-tab-cycle.sh next
binde = Shift+Alt, Tab, exec, bash $HOME/.config/caelestia/scripts/window-alt-tab-cycle.sh prev
bind = SUPER SHIFT, A, exec, bash $HOME/.config/caelestia/scripts/activity-monitor.sh
bind = SUPER SHIFT, H, exec, bash $HOME/.config/caelestia/scripts/audio-toggle-analog-output.sh

bind = SUPER SHIFT, M, exec, bash -c 'f="${HOME}/.config/caelestia/quantum-moon-root"; [[ -f "$f" ]] && read -r QM < "$f" && exec "$QM/scripts/qm-random"'

source = $cConf/hypr-user-local.conf
