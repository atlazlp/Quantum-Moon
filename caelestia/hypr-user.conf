# Merged after stock Caelestia hypr snippets.

# Never set PATH here with `env = PATH, ...` — incomplete expansion can leave only ~/.local/bin and break subprocesses after reload.

source = ~/.config/caelestia/hypr-env-qt.conf
source = ~/.local/share/caelestia/hypr/scheme/shadow.conf

unbind = Ctrl+Super+Alt, R
bindr = Ctrl+Super+Alt, R, exec, sh -c 'qs -c caelestia kill; sleep 0.35; caelestia shell -d; sleep 0.5; hyprctl hyprpaper reload 2>/dev/null || hyprpaper; f="${HOME}/.config/caelestia/quantum-moon-root"; [ -f "$f" ] && read -r QM < "$f" && [ -n "$QM" ] && [ -f "$QM/scripts/qm-video-sync-from-state" ] && bash "$QM/scripts/qm-video-sync-from-state"'

layerrule = no_anim true, match:namespace mpvpaper

# App launcher — opens on Super release only; Super+chord cancels via launcherInterrupt (see hypr-launcher-interrupts.conf)
unbind = Super, Super_L
unbind = Super, Super_R
bindi = Super, Super_L, global, caelestia:launcher
bindi = Super, Super_R, global, caelestia:launcher
# Hyprland links `global` binds at creation, but the caelestia shell registers
# the caelestia:launcher global only after it starts — so the static binds above
# are created "dead" at boot and Super-tap does nothing. Re-apply them once the
# global is actually registered.
exec-once = bash -c 'for i in $(seq 1 30); do hyprctl globalshortcuts 2>/dev/null | grep -q "caelestia:launcher " && break; sleep 1; done; for k in Super_L Super_R; do hyprctl keyword unbind "Super,$k" >/dev/null 2>&1; hyprctl keyword bindi "Super,$k,global,caelestia:launcher" >/dev/null 2>&1; done'
binditn = Super, catchall, global, caelestia:launcherInterrupt
binditn = Super, mouse:272, global, caelestia:launcherInterrupt
binditn = Super, mouse:273, global, caelestia:launcherInterrupt
binditn = Super, mouse:274, global, caelestia:launcherInterrupt
binditn = Super, mouse:275, global, caelestia:launcherInterrupt
binditn = Super, mouse:276, global, caelestia:launcherInterrupt
binditn = Super, mouse:277, global, caelestia:launcherInterrupt
binditn = Super, mouse_up, global, caelestia:launcherInterrupt
binditn = Super, mouse_down, global, caelestia:launcherInterrupt
source = ~/.config/caelestia/hypr-launcher-interrupts.conf

# Example triple-head layout — edit names/resolutions to match `hyprctl monitors`.
monitor=HDMI-A-1,1366x768@59.79,0x0,1,transform,1
monitor=DP-2,1920x1080@143.99,768x0,1
monitor=DP-3,1366x768@59.79,2688x312,1

exec-once = sh -c "sleep 1 && exec hyprpaper"
exec-once = hyprresume -c $HOME/.config/caelestia/hyprresume.toml
exec-once = bash -c 'f="${HOME}/.config/caelestia/quantum-moon-root"; [[ -f "$f" ]] || exit 0; read -r QM < "$f"; repo="$(dirname "$QM")"; command -v git-lfs >/dev/null && [[ -d "$repo/.git" ]] && (cd "$repo" && git lfs pull --include="quantum-moon/modes/*/wallpapers/center.mp4") || true; sleep 2; "$QM/scripts/qm-apply" --persisted; exec "$QM/scripts/qm-video-watch"'
# Do not use `exec` here — hyprctl reload would respawn center video during game mode. Video restore runs from the Caelestia restart bind and qm-apply only.
exec-once = ~/.config/hypr/scripts/caelestia-autolock-on-login.sh
exec-once = ~/.config/caelestia/scripts/inhibit-sleep-while-audio-playback.sh
# suspend-resume-watch.sh now runs as the caelestia-suspend-resume-watch.service
# user unit (Restart=always) instead of exec-once, so it survives mid-session
# death (exec-once only launches at Hyprland startup, never restarts).
exec-once = bash -c 'pgrep -f "[p]roton-hide-ghost-windows.sh" >/dev/null || exec bash $HOME/.config/caelestia/scripts/proton-hide-ghost-windows.sh'
exec-once = bash -c 'pgrep -f "[t]elegram-unfullscreen-chat.py" >/dev/null || exec python3 $HOME/.config/caelestia/scripts/telegram-unfullscreen-chat.py'

# Proton/Steam: tiny floating ghost windows (explorer /desktop, CEF leaks) must not steal focus
windowrule = no_focus on, match:class steam_app_.*, match:float true, match:initial_title negative:.+
windowrule = no_initial_focus on, match:class steam_app_.*, match:float true, match:initial_title negative:.+

# Hyprspace: do not load on Hyprland 0.54.x (plugin SIGSEGV). If a built Hyprspace.so exists, keep it renamed to *.disabled until upstream fixes it.

unbind = Alt, Tab
unbind = Shift+Alt, Tab
unbind = SUPER, D
bind = SUPER, D, exec, bash $HOME/.config/caelestia/scripts/workspace-overview-toggle.sh all
binde = Alt, Tab, exec, bash $HOME/.config/caelestia/scripts/window-alt-tab-cycle.sh next
binde = Shift+Alt, Tab, exec, bash $HOME/.config/caelestia/scripts/window-alt-tab-cycle.sh prev
bind = SUPER SHIFT, A, exec, bash $HOME/.config/caelestia/scripts/activity-monitor.sh
bind = SUPER SHIFT, H, exec, bash $HOME/.config/caelestia/scripts/audio-toggle-analog-output.sh

bind = SUPER SHIFT, M, exec, bash -c 'f="${HOME}/.config/caelestia/quantum-moon-root"; [[ -f "$f" ]] && read -r QM < "$f" && exec "$QM/scripts/qm-random"'

# special:special scratchpad — move focused window in/out (not the stock one-way movetoworkspace binds).
unbind = Super+Alt, S
unbind = Ctrl+Super+Shift, up
bind = Super+Alt, S, exec, bash $HOME/.config/caelestia/scripts/toggle-special-window.sh
bind = Ctrl+Super, S, exec, bash $HOME/.config/caelestia/scripts/toggle-special-window.sh
bind = Ctrl+Super, SPACE, exec, bash $HOME/.config/caelestia/scripts/toggle-special-window.sh

# Discord: tiled on the active workspace (override Caelestia special:communication routing).
windowrule = workspace unset, match:class discord
windowrule = suppress_event maximize fullscreen, match:class discord
windowrule = fullscreen_state 0 0, match:class discord
windowrule = float off, match:class discord
windowrule = tile on, match:class discord

# Spotify: tiled on the active workspace (override Caelestia special:music routing).
windowrule = workspace unset, match:class Spotify
windowrule = workspace unset, match:initial_title Spotify( Free)?
windowrule = suppress_event maximize fullscreen, match:class Spotify
windowrule = suppress_event maximize fullscreen, match:initial_title Spotify( Free)?
windowrule = fullscreen_state 0 0, match:class Spotify
windowrule = fullscreen_state 0 0, match:initial_title Spotify( Free)?
windowrule = float off, match:class Spotify
windowrule = float off, match:initial_title Spotify( Free)?
windowrule = tile on, match:class Spotify
windowrule = tile on, match:initial_title Spotify( Free)?

# Telegram: keep media viewer out of chat groups so its fullscreen does not stick on the chat window.
windowrule = group barred, match:class org.telegram.desktop, match:initial_title Media viewer
windowrule = suppress_event maximize fullscreen, match:class org.telegram.desktop, match:initial_title negative:Media viewer
windowrule = fullscreen_state 0 0, match:class org.telegram.desktop, match:initial_title negative:Media viewer

# Stop chat apps from stealing focus + warping the cursor to the left-monitor
# communication group when a notification arrives (misc:focus_on_activate +
# cursor warp). Suppress their self-activation requests; clicking to focus still
# works. (This replaces the old anti-teleport rule lost in the 0.55 windowrule
# syntax migration.)
windowrule = suppress_event activate, match:class discord|equibop|vesktop|whatsapp|org\.telegram\.desktop

source = $cConf/hypr-user-local.conf
