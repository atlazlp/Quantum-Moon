# Hyprland session restore — installed to ~/.config/caelestia/hyprresume.toml
# Started from hypr-user.conf: hyprresume -c $HOME/.config/caelestia/hyprresume.toml

[general]
save_interval = 120
session_dir = "~/.local/share/hyprresume"
restore_on_start = true
per_window_launch = true
restore_geometry = true
restore_layout = true

[rules]
exclude = [
    "^xdg-desktop-portal.*",
    "^org\\.kde\\.polkit.*",
    "^cursor$",
    "^org\\.quickshell$",
    "^mpvpaper$",
    "^hyprpaper$",
    "^org\\.gnome\\.Shell$",
    "^swappy$",
]

[overrides]
# Uncomment if restore launches plain nautilus instead of the GVfs-friendly wrapper:
# "org.gnome.Nautilus" = "bash $HOME/.config/caelestia/scripts/nautilus-wrap.sh"
