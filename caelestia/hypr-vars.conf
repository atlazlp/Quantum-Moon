# Overrides upstream Caelestia hypr/variables.conf defaults after install.
# QM theme sync (glow + groupbar colours) — must load before hyprland/decoration.conf.
source = ~/.local/share/caelestia/hypr/scheme/groupbar.conf

$terminal = kitty
$browser = firefox
$editor = $cConf/scripts/cursor-clean.sh
$fileExplorer = $HOME/.config/caelestia/scripts/nautilus-wrap.sh
$cursorTheme = capitaine-cursors

# Match multi-window outer gap when only one tiled window (Caelestia default singleWindowGapsOut is 20).
$singleWindowGapsOut = $windowGapsOut
