splash = false
# Fallback paths for the maintainer's three outputs; qm-apply rewrites this file for
# whichever monitors Hyprland reports (one to three). Extra blocks for unplugged names are ok.

wallpaper {
    monitor = HDMI-A-1
    path = ~/.config/caelestia/assets/wallpapers/bg-hdmi-a-1.png
    fit_mode = cover
}

wallpaper {
    monitor = DP-2
    path = ~/.config/caelestia/assets/wallpapers/bg-dp-2.png
    fit_mode = cover
}

wallpaper {
    monitor = DP-3
    path = ~/.config/caelestia/assets/wallpapers/bg-dp-3.png
    fit_mode = cover
}
